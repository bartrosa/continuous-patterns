experiment:
  name: stress_inglis
  model: cavity_reactive
  seed: 42
  description: |
    Canonical card for Inglis / elliptic-cavity stress; semi-axes synced from geometry.

geometry:
  type: elliptic_cavity
  L: 200.0
  n: 512
  a: 80.0
  b: 40.0
  theta: 0.0
  eps_scale: 2.0

physics:
  W: 1.0
  gamma: 4.0
  kappa_x: 0.5
  kappa_y: 0.5
  M_m: 0.01
  M_c: 1.0
  D_c: 1.0
  k_rxn: 0.5
  c_sat: 0.2
  c_0: 1.0
  c_ostwald: 0.6
  w_ostwald: 0.1
  lambda_bar: 10.0
  use_ratchet: true
  phi_m_ratchet_low: 0.3
  phi_m_ratchet_high: 0.5

stress:
  mode: inglis
  S_xx_far: 1.0
  S_yy_far: 0.3
  S_xy_far: 0.0
  stress_coupling_B: 0.3

time:
  T: 10000.0

initial: {}
