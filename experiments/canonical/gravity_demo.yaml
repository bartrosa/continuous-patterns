experiment:
  name: gravity_demo
  model: cavity_reactive
  seed: 42
  description: |
    Canonical card with optional gravity rim ramp and body force on c (Package 4).

geometry:
  type: circular_cavity
  L: 200.0
  R: 80.0
  n: 512
  eps_scale: 2.0

physics:
  W: 1.0
  gamma: 4.0
  kappa_x: 0.5
  kappa_y: 0.5
  M_m: 0.01
  M_c: 1.0
  D_c: 1.0
  k_rxn: 0.5
  c_sat: 0.2
  c_0: 1.0
  c_ostwald: 0.6
  w_ostwald: 0.1
  lambda_bar: 10.0
  use_ratchet: true
  phi_m_ratchet_low: 0.3
  phi_m_ratchet_high: 0.5

stress:
  mode: none
  sigma_0: 0.0
  stress_coupling_B: 0.0

gravity:
  rim_alpha: 0.3
  g_c: 0.05

time:
  T: 10000.0

initial: {}
