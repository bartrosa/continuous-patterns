experiment:
  name: wedge_pinning
  model: agate_ch
  seed: 42
  description: |
    Q1/Q2 baseline on a 120° annular wedge opening upward (same physics as medium_pinning).

geometry:
  type: wedge_cavity
  L: 200.0
  n: 512
  R_inner: 25.0
  R_outer: 80.0
  opening_angle: 2.0944
  theta_center: 1.5708
  eps_scale: 2.0

physics:
  W: 1.0
  gamma: 4.0
  kappa_x: 0.5
  kappa_y: 0.5
  M_m: 0.01
  M_c: 1.0
  D_c: 1.0
  k_rxn: 0.5
  c_sat: 0.2
  c_0: 1.0
  c_ostwald: 0.6
  w_ostwald: 0.1
  lambda_bar: 10.0
  use_ratchet: true
  phi_m_ratchet_low: 0.3
  phi_m_ratchet_high: 0.5

stress:
  mode: none
  sigma_0: 0.0
  stress_coupling_B: 0.0
  stress_eps_factor: 3.0

time:
  T: 10000.0

initial: {}
