# Experiment 5a — very strong anisotropy (κ_x : κ_y = 10 : 1).
experiment:
  name: anisotropy_aniso_10x
  seed: 42

grid:
  n: 512
  L: 200.0

physics:
  R: 80.0
  W: 1.0
  gamma: 3.0
  kappa: 0.5
  kappa_x: 5.0
  kappa_y: 0.5
  lambda_barrier: 10.0
  D_c: 1.0
  k_reaction: 0.5
  M_m: 0.01
  M_c: 1.0
  c_sat: 0.2
  c_0: 1.0
  c_ostwald: 0.6
  w_ostwald: 0.1
  phi_m_ratchet_low: 0.3
  phi_m_ratchet_high: 0.5
  use_ratchet: true

time:
  dt: 0.01
  T_total: 10000.0
  snapshot_every: 1000

diagnostics:
  save_final_state: true
  flux_sample_dt: 2.0
  progress_stderr: true

uniform_supersaturation: false
rho_m: 1.0
rho_c: 1.0
record_spectral_mass_diagnostic: true
