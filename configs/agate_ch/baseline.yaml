# Agate CH falsification — barrier + pinning + longer horizon
grid: 512
L: 200.0
R: 80.0
W: 1.0
gamma: 4.0
kappa: 0.5
lambda_barrier: 10.0

D_c: 1.0
k_reaction: 0.5
M_m: 0.01
M_c: 1.0
c_sat: 0.2
c_0: 1.0
c_ostwald: 0.6
w_ostwald: 0.1

phi_m_ratchet_low: 0.3
phi_m_ratchet_high: 0.5
use_ratchet: true

dt: 0.01
T: 10000.0
# Was 4000 (250 snaps): storage/UI cadence — independent of flux sampling below.
snapshot_every: 1000

# Option B (∫ flux dt vs dissolved disk): physics cadence, NOT tied to snapshots.
# At dt=0.01, flux_sample_dt=2 → sample every 200 steps (~5000 samples / T=10000).
flux_sample_dt: 2.0

seed: 42
uniform_supersaturation: false

rho_m: 1.0
rho_c: 1.0

record_spectral_mass_diagnostic: true
