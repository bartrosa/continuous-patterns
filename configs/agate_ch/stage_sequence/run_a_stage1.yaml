# Stage I — agate_ch with rim supply + reaction (γ=3, concentric-band regime)
experiment:
  name: stage_seq_run_a
  seed: 42

grid:
  n: 512
  L: 200.0

physics:
  R: 80.0
  W: 1.0
  kappa: 0.5
  lambda_barrier: 10.0
  gamma: 3.0
  M_m: 0.01
  M_c: 1.0
  D_c: 1.0
  enable_reaction: true
  k_reaction: 1.0
  c_sat: 0.2
  c_0: 1.0
  c_ostwald: 0.5
  w_ostwald: 0.1
  phi_m_ratchet_low: 0.3
  phi_m_ratchet_high: 0.5
  use_ratchet: true
  enable_dirichlet: true

initial_condition:
  type: cavity

time:
  dt: 0.01
  T_total: 10000.0
  snapshot_every: 1000

diagnostics:
  save_final_state: true
  progress_stderr: true

uniform_supersaturation: false
rho_m: 1.0
rho_c: 1.0
flux_sample_dt: 2.0
record_spectral_mass_diagnostic: false
