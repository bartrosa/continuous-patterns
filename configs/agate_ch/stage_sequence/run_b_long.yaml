# Experiment 2 — Run B long horizon (γ=6, aging / saturation)
# Snapshot IC from existing Stage I run (do not re-run Run A).
experiment:
  name: stage_seq_run_b_long
  seed: 42

grid:
  n: 512
  L: 200.0

physics:
  R: 80.0
  W: 1.0
  kappa: 0.5
  lambda_barrier: 10.0
  gamma: 6.0
  M_m: 0.01
  M_c: 1.0
  D_c: 1.0
  enable_reaction: false
  k_reaction: 0.0
  c_sat: 0.2
  c_0: 1.0
  c_ostwald: 0.5
  w_ostwald: 0.1
  phi_m_ratchet_low: 0.3
  phi_m_ratchet_high: 0.5
  use_ratchet: true
  enable_dirichlet: false
  apply_cavity_mask: true
  project_c_on_cavity: false

initial_condition:
  type: from_snapshot
  snapshot_path: results/agate_ch/stage_seq_run_a_20260423_115846/final_state.npz

time:
  dt: 0.01
  T_total: 100000.0
  snapshot_every: 2000

diagnostics:
  save_final_state: true
  mass_balance_mode: spectral_only
  flux_sample_dt: null
  progress_stderr: true

uniform_supersaturation: false
rho_m: 1.0
rho_c: 1.0
record_spectral_mass_diagnostic: true
