# Parallel-friendly list of experiment ids → overlay params on baseline.yaml
runs:
  - id: baseline
    params: {}
  - id: high_gamma
    params: { gamma: 5.0 }
  - id: low_gamma
    params: { gamma: 0.5 }
  - id: equal_mobility
    params: { M_m: 1.0, M_c: 1.0 }
  - id: uniform_supersat
    params: { uniform_supersaturation: true }
  - id: strong_drive
    params: { c_0: 2.0 }
