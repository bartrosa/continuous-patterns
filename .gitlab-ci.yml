# Quality checks (CPU JAX). Use `uv sync --extra cuda` locally for GPU.
# https://docs.astral.sh/uv/

stages:
  - quality

default:
  interruptible: true

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

.uv_base:
  image: python:3.12-slim-bookworm
  before_script:
    - pip install --no-cache-dir uv
    - uv --version
    - uv sync --frozen --extra dev

quality:
  extends: .uv_base
  stage: quality
  script:
    - uv run ruff check .
    - uv run ruff format --check .
    - uv run pytest
